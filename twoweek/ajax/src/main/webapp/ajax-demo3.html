<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ajax请求实例起步--原生的异步请求</title>
</head>
<body>
<h1>服务器返回的数据</h1>
<hr>
<h2 id="info">请求前2</h2>
<script>
<!--    1创建核心对象-->
    let xHttp;
    if (window.XMLHttpRequest) {//判断当前浏览器是否是高版本
        xHttp = new XMLHttpRequest();
    } else {
        //for IE5 IE6
        xHttp =new ActiveXObject("Microsoft.XMLTYPE")
    }
//发送请求
    xHttp.open("GET","http://localhost/ajaxServlet")
    xHttp.send();
//获取相应
xHttp.onreadystatechange = function () {
    if (this.readyState === 4 && this.status === 200) {
        var responseText = this.responseText;
        setTimeout(function () {
            document.getElementById("info").innerText=responseText
        },2000);
    }
};
</script>
</body>
</html>
