<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>JSON字符串实例</title>

</head>
<body>
<script>
    const jsonStr='{"nanme":"zhangsan","age":23,"cities":["北京","上海"]}';
    console.log(jsonStr)
    console.log(typeof jsonStr)
    //转成js对象
    console.log("转换++++++++++")
    const jsonObj=JSON.parse(jsonStr)
    console.log(typeof jsonObj)
    console.log('-------------------------------------------')
    const obj= {
      name:"lisi",
        age:24
    }
    console.log('对象的名称:'+obj.name)
    console.log(typeof obj)
    console.log("转换+++++++++++")
    //转成json独享
    const objStr=JSON.stringify(obj)
    console.log(typeof objStr)
</script>
</body>
</html>
